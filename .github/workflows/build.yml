name: Build site

on:
  pull_request:
    branches: [main]
    paths:
      - "data/**.md"
      - "assets/team/**"
      - "build.py"
      - "index.html"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Regenerate index.html
        run: uv run build.py

      - name: Verify index.html is up-to-date
        run: |
          git diff --exit-code index.html || (
            echo "index.html is out of date. Run 'python build.py' locally and include the result in your PR."
            exit 1
          )
